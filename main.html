<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllstarLounge — PokerPro AI Training</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }
    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    nav button {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
    }
    nav button:hover, nav button.active {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    .panel {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .panel.visible { display: block; }
    .panel h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    input, select, textarea {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem 0.75rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button.primary {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
    }
