<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllstarLounge — PokerPro AI Training</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
    }
    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    nav button {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
    }
    nav button:hover, nav button.active {
      background: var(--accent);
      color: var(--bg-dark);
      border-color: var(--accent);
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    .panel {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .panel.visible { display: block; }
    .panel h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.25rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    input, select, textarea {
      width: 100%;
      max-width: 400px;
      padding: 0.5rem 0.75rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button.primary {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:hover {
      background: var(--accent-hover);
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }
    .card-slot {
      width: 60px;
      height: 84px;
      background: linear-gradient(145deg, #1a1f2e, #252b3b);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .card-slot.hearts, .card-slot.diamonds { color: var(--danger); }
    .card-slot.clubs, .card-slot.spades { color: var(--text); }
    .result-box {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-dark);
      border-radius: var(--radius);
      border-left: 4px solid var(--accent);
    }
    .result-box .hand-name { font-weight: 600; color: var(--success); }
    .result-box .kickers { color: var(--text-muted); font-size: 0.9rem; }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: var(--bg-dark);
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      min-width: 140px;
    }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-card .label { font-size: 0.8rem; color: var(--text-muted); }
    .session-list { list-style: none; }
    .session-list li {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .session-list li:last-child { border-bottom: none; }
    .session-list .session-id { font-family: monospace; font-size: 0.85rem; color: var(--text-muted); }
    .session-list .session-meta { font-size: 0.875rem; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
    .badge.tier { background: var(--accent); color: var(--bg-dark); }
    .badge.hands { background: var(--success); color: var(--bg-dark); }
    .ai-suggestion {
      padding: 1rem;
      background: linear-gradient(135deg, rgba(88,166,255,0.1), rgba(88,166,255,0.05));
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      margin-top: 1rem;
    }
    .ai-suggestion .action { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .ai-suggestion .reasoning { margin-top: 0.5rem; color: var(--text-muted); }
    .drill-question {
      padding: 1rem;
      background: var(--bg-dark);
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .drill-question .hole-cards { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .drill-feedback { margin-top: 0.5rem; font-size: 0.9rem; }
    .drill-feedback.correct { color: var(--success); }
    .drill-feedback.incorrect { color: var(--danger); }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .range-matrix {
      display: grid;
      grid-template-columns: repeat(13, 1fr);
      gap: 2px;
      font-size: 0.7rem;
      max-width: 520px;
    }
    .range-matrix .cell {
      padding: 0.25rem;
      text-align: center;
      background: var(--bg-dark);
      border-radius: 2px;
    }
    .range-matrix .cell.raise { background: rgba(63,185,80,0.3); }
    .range-matrix .cell.call { background: rgba(210,153,34,0.3); }
    .range-matrix .cell.fold { background: rgba(248,81,73,0.2); }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .tabs button {
      padding: 0.5rem 1rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      cursor: pointer;
    }
    .tabs button.active { background: var(--accent); color: var(--bg-dark); border-color: var(--accent); }
    .progress-bar {
      height: 8px;
      background: var(--bg-dark);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
